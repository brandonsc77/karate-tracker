<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Karate Tracker 2026</title>
<meta name="theme-color" content="#050505" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Karate 2026" />
<link rel="manifest" href="manifest.webmanifest?v=10" />
<link rel="apple-touch-icon" href="icon-180.png?v=10" />
<style>
:root{
  --bg:#050505;
  --bg-2:#0b0b0d;
  --surface:#111113;
  --surface-2:#18181b;
  --surface-3:#202024;
  --text:#f5f7fb;
  --muted:#a1a1aa;
  --muted-2:#71717a;
  --purple:#7c3aed;
  --purple-2:#9f67ff;
  --border:#27272a;
  --shadow:0 14px 34px rgba(0,0,0,.38);
  --radius:24px;
  --green:#22c55e;
  --green-bg:#0b2d16;
  --red:#ef4444;
  --red-bg:#3d1111;
  --gray-pill:#27272a;
  --gray-text:#e4e4e7;
  --button-dark:#1a1a1d;
  --button-dark-2:#232329;
}

*{box-sizing:border-box}
html,body{height:100%}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:
    radial-gradient(circle at top, rgba(124,58,237,.14), transparent 28%),
    linear-gradient(180deg,#09090b 0%,#050505 100%);
  color:var(--text);
  padding:env(safe-area-inset-top) 14px calc(env(safe-area-inset-bottom) + 90px);
}

.app{
  max-width:900px;
  margin:0 auto;
  padding-top:8px;
}

.hero,.card{
  background:linear-gradient(180deg,rgba(255,255,255,.02) 0%, rgba(255,255,255,.01) 100%), var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
}

.hero{
  padding:22px;
  margin-bottom:16px;
  background:
    radial-gradient(circle at top right, rgba(124,58,237,.22), transparent 38%),
    linear-gradient(180deg,rgba(255,255,255,.03) 0%, rgba(255,255,255,.01) 100%),
    var(--surface);
}

.hero h1{
  margin:0;
  font-size:30px;
  line-height:1.05;
  letter-spacing:-0.03em;
}

.sub{
  margin-top:8px;
  color:var(--muted);
  font-size:14px;
}

.hero-row{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
  flex-wrap:wrap;
}

.pill{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:rgba(124,58,237,.18);
  color:#d7c2ff;
  font-weight:800;
  padding:10px 14px;
  border-radius:999px;
  font-size:13px;
  border:1px solid rgba(159,103,255,.18);
}

.toolbar{
  display:flex;
  gap:10px;
  margin-bottom:16px;
  flex-wrap:wrap;
}

button{
  border:none;
  background:var(--button-dark);
  color:var(--text);
  border-radius:16px;
  padding:13px 15px;
  font-size:14px;
  font-weight:800;
  border:1px solid var(--border);
  cursor:pointer;
  transition:transform .15s ease, background .15s ease, border-color .15s ease;
}

button:active{
  transform:scale(.98);
}

.primary{
  background:linear-gradient(135deg,var(--purple),var(--purple-2));
  color:#fff;
  border-color:transparent;
}

.secondary{
  background:#201433;
  color:#d8c2ff;
  border-color:#37204f;
}

.stripe-btn{
  background:linear-gradient(135deg,#991b1b,#ef4444);
  color:#fff;
  border-color:transparent;
}

.tile-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  margin-bottom:16px;
}

.tile{
  padding:18px;
  background:
    radial-gradient(circle at top right, rgba(255,255,255,.03), transparent 35%),
    linear-gradient(180deg,rgba(255,255,255,.02) 0%, rgba(255,255,255,.01) 100%),
    var(--surface);
}

.tile-top{
  display:flex;
  justify-content:space-between;
  gap:8px;
  align-items:flex-start;
}

.tile-name{
  font-size:22px;
  font-weight:900;
  letter-spacing:-0.02em;
}

.tile-belt{
  font-size:13px;
  color:var(--muted);
  font-weight:700;
  margin-top:4px;
}

.status-pill{
  display:inline-flex;
  align-items:center;
  padding:8px 11px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  border:1px solid transparent;
}

.status-pill.ready{
  background:var(--green-bg);
  color:#86efac;
  border-color:#1f5f34;
}

.status-pill.progress{
  background:var(--gray-pill);
  color:var(--gray-text);
  border-color:#35353b;
}

.status-pill.sick{
  background:var(--red-bg);
  color:#fca5a5;
  border-color:#682222;
}

.belt-chip{
  display:inline-flex;
  align-items:center;
  gap:8px;
  border-radius:16px;
  padding:10px 14px;
  margin-top:12px;
  font-weight:900;
  border:1px solid rgba(255,255,255,.14);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
}

.countdown{
  margin-top:16px;
  font-size:42px;
  font-weight:900;
  line-height:1;
  letter-spacing:-0.03em;
}

.countdown-label{
  margin-top:6px;
  color:var(--muted);
  font-size:13px;
}

.mini-progress{
  margin-top:14px;
}

.bar{
  width:100%;
  height:10px;
  background:#27272a;
  border-radius:999px;
  overflow:hidden;
}

.fill{
  height:100%;
  background:linear-gradient(90deg,var(--purple),var(--purple-2));
  border-radius:999px;
}

.tile-meta{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:14px;
}

.mini{
  background:var(--surface-2);
  border:1px solid var(--border);
  border-radius:18px;
  padding:12px;
}

.mini .m-label{
  font-size:12px;
  color:var(--muted);
}

.mini .m-value{
  font-size:24px;
  font-weight:900;
  margin-top:4px;
  letter-spacing:-0.03em;
}

/* ── Stripe section ── */
.stripe-section{
  margin-top:14px;
  background:var(--surface-2);
  border:1px solid var(--border);
  border-radius:18px;
  padding:12px 14px;
}

.stripe-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.stripe-label{
  font-size:12px;
  color:var(--muted);
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.04em;
}

.stripe-status{
  font-size:12px;
  font-weight:900;
  padding:4px 10px;
  border-radius:999px;
}

.stripe-status.stripe-ready{
  background:rgba(245,158,11,.15);
  color:#fcd34d;
  border:1px solid rgba(245,158,11,.3);
}

.stripe-status.stripe-progress{
  background:var(--gray-pill);
  color:var(--gray-text);
  border:1px solid #35353b;
}

.stripe-status.stripe-maxed{
  background:var(--green-bg);
  color:#86efac;
  border:1px solid #1f5f34;
}

.stripe-dots{
  display:flex;
  gap:8px;
  align-items:center;
  margin-bottom:10px;
}

.stripe-dot{
  width:22px;
  height:22px;
  border-radius:50%;
  border:2px solid #3f3f46;
  background:transparent;
  transition:background .2s, border-color .2s;
}

.stripe-dot.earned{
  background:linear-gradient(135deg,#991b1b,#ef4444);
  border-color:#ef4444;
  box-shadow:0 0 8px rgba(239,68,68,.4);
}

.stripe-classes{
  font-size:12px;
  color:var(--muted);
}

.stripe-classes strong{
  color:var(--text);
}

/* ── Tile action rows ── */
.tile-actions-top{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
  margin-top:14px;
}

.tile-actions-bottom{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
  margin-top:8px;
}

.tile-actions-top button,
.tile-actions-bottom button{
  padding:12px 10px;
}

.calendar-card{
  padding:18px;
}

.calendar-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:14px;
}

.section-title{
  font-size:22px;
  font-weight:900;
  margin:10px 0 14px;
  letter-spacing:-0.02em;
}

.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
}

.day-name,.day-cell{
  text-align:center;
  border-radius:18px;
  padding:12px 8px;
}

.day-name{
  font-size:12px;
  color:var(--muted);
  font-weight:800;
}

.day-cell{
  background:var(--surface-2);
  border:1px solid var(--border);
  min-height:84px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
}

.day-cell.empty{
  background:transparent;
  border:none;
}

.day-num{
  font-size:15px;
  font-weight:900;
}

.dots{
  display:flex;
  gap:4px;
  flex-wrap:wrap;
  justify-content:center;
  margin-top:8px;
}

.dot{
  width:9px;
  height:9px;
  border-radius:50%;
}

.legend{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
  margin-top:14px;
  font-size:13px;
  color:var(--muted);
}

.legend span{
  display:inline-flex;
  align-items:center;
  gap:6px;
}

.history-list,.promo-list{
  display:grid;
  gap:12px;
}

.history-item,.promo-item{
  padding:16px;
}

.history-head,.promo-head{
  display:flex;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
}

.history-date,.promo-date{
  font-size:13px;
  color:var(--muted);
  font-weight:700;
}

.empty-state{
  padding:22px;
  text-align:center;
  color:var(--muted);
}

.stack{
  display:grid;
  gap:16px;
}

.tabbar{
  position:fixed;
  left:50%;
  bottom:12px;
  transform:translateX(-50%);
  width:min(920px,calc(100vw - 20px));
  background:rgba(18,18,20,.92);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 20px 40px rgba(0,0,0,.45);
  border-radius:26px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  padding:8px;
  z-index:100;
}

.tabbar button{
  border:none;
  background:transparent;
  padding:12px 10px;
  border-radius:18px;
  color:var(--muted);
}

.tabbar button.active{
  background:rgba(124,58,237,.18);
  color:#e9ddff;
  font-weight:900;
}

.view{display:none}
.view.active{display:block}

@media (max-width:720px){
  .tile-grid{grid-template-columns:1fr}
}

@media (max-width:560px){
  .tile-name{font-size:20px}
  .calendar-grid{gap:6px}
  .day-cell{min-height:72px;padding:10px 4px}
  .tile-actions-bottom{grid-template-columns:1fr}
}
</style>
</head>

<div class="app">

      <div>

      </div>

  </section>

  <section class="view active" id="view-dashboard">
    <div class="toolbar">

    </div>

  </section>

  <section class="view" id="view-calendar">

      <div class="calendar-head">

        </div>
        <div style="display:flex;gap:8px;align-items:center">

      <div class="legend">

        <span><i class="dot" style="background:#ef4444"></i> Sick</span>
        <span><i class="dot" style="background:#10b981"></i> Promotion</span>
      </div>
    </div>

    <div class="stack" style="margin-top:16px">
      <div class="card history-item">
        <div class="section-title" style="margin-top:0">Recent Attendance</div>
        <div id="historyList" class="history-list"></div>
      </div>
    </div>
  </section>

  <section class="view" id="view-history">
    <div class="stack">
      <div class="card promo-item">
        <div class="section-title" style="margin-top:0">Promotion History</div>
        <div id="promoList" class="promo-list"></div>
      </div>
    </div>
  </section>
</div>

<nav class="tabbar">
  <button class="active" data-view="dashboard">Overview</button>
  <button data-view="calendar">Calendar</button>
  <button data-view="history">History</button>
</nav>

    {"id":"James-2026-02-25-present","child":"James","type":"present","date":"2026-02-25"},
    {"id":"James-2026-03-03-present","child":"James","type":"present","date":"2026-03-03"},
    {"id":"James-2026-03-04-present","child":"James","type":"present","date":"2026-03-04"},
    {"id":"James-2026-03-10-present","child":"James","type":"present","date":"2026-03-10"},
    {"id":"James-2026-03-24-present","child":"James","type":"present","date":"2026-03-24"},
    {"id":"James-2026-03-25-present","child":"James","type":"present","date":"2026-03-25"},
    {"id":"James-2026-04-14-present","child":"James","type":"present","date":"2026-04-14"},
    {"id":"James-2026-04-15-present","child":"James","type":"present","date":"2026-04-15"},

    {"id":"Caroline-2026-02-10-sick","child":"Caroline","type":"sick","date":"2026-02-10"},
    {"id":"Viviann-2026-02-10-sick","child":"Viviann","type":"sick","date":"2026-02-10"},
    {"id":"Addyson-2026-02-18-sick","child":"Addyson","type":"sick","date":"2026-02-18"},
    {"id":"Caroline-2026-03-10-sick","child":"Caroline","type":"sick","date":"2026-03-10"},
    {"id":"Addyson-2026-03-31-sick","child":"Addyson","type":"sick","date":"2026-03-31"},
    {"id":"Caroline-2026-03-31-present","child":"Caroline","type":"present","date":"2026-03-31"},
    {"id":"Viviann-2026-03-31-present","child":"Viviann","type":"present","date":"2026-03-31"},
    {"id":"James-2026-03-31-present","child":"James","type":"present","date":"2026-03-31"}
  ],
  "promotionHistory": [
    {"id":"seed-promo-1","date":"2026-03-28","child":"Caroline","from":"Brown","to":"Advanced Brown","note":"Earned on Saturday. Not a counted class."}
  ]
};

function isoToday(){
  // FIX: Use local date components instead of toISOString() which returns UTC.
  const d = new Date();
  return new Date(d.getFullYear(), d.getMonth(), d.getDate(), 12)
    .toISOString()
    .slice(0, 10);
}

function friendlyDate(d){
  return new Date(d + "T12:00:00").toLocaleDateString(undefined,{
    month:"short",
    day:"numeric",
    year:"numeric"
  });
}

function monthTitle(d){
  return d.toLocaleDateString(undefined,{month:"long",year:"numeric"});
}

function yearFromIso(d){
  return Number(String(d).slice(0,4));
}

function classesRemaining(n){
  return Math.max(REQUIRED - n, 0);
}

function stripeClassesRemaining(classesSinceStripe){
  return Math.max(STRIPE_REQUIRED - classesSinceStripe, 0);
}

function beltStyle(belt){
  switch(belt){
    case "White":
      return "background:#f5f5f5;color:#111;border-color:#d4d4d8;";
    case "Yellow":
      return "background:#facc15;color:#111;border-color:#fcd34d;";
    case "Orange":
      return "background:#fb923c;color:#111;border-color:#fdba74;";
    case "Blue":
      return "background:#60a5fa;color:#08111f;border-color:#93c5fd;";
    case "Green":
      return "background:#22c55e;color:#07140c;border-color:#4ade80;";
    case "Advanced Green":
      return "background:linear-gradient(to bottom,#22c55e 0%,#22c55e 42%,#7c3aed 42%,#7c3aed 58%,#22c55e 58%,#22c55e 100%);color:#08110b;border-color:#4ade80;";
    case "Purple":
      return "background:#7c3aed;color:#fff;border-color:#9f67ff;";
    case "Advanced Purple":
      return "background:linear-gradient(to bottom,#7c3aed 0%,#7c3aed 42%,#8b5a2b 42%,#8b5a2b 58%,#7c3aed 58%,#7c3aed 100%);color:#fff;border-color:#b48d68;";
    case "Brown":
      return "background:#8b5a2b;color:#fff;border-color:#b48d68;";
    case "Advanced Brown":
      return "background:linear-gradient(to bottom,#8b5a2b 0%,#8b5a2b 42%,#dc2626 42%,#dc2626 58%,#8b5a2b 58%,#8b5a2b 100%);color:#fff;border-color:#d7b08a;";
    case "Red":
      return "background:#dc2626;color:#fff;border-color:#f87171;";
    case "Advanced Red":
      return "background:linear-gradient(to bottom,#dc2626 0%,#dc2626 42%,#000000 42%,#000000 58%,#dc2626 58%,#dc2626 100%);color:#fff;border-color:#f87171;";
    case "Black":
      return "background:#000;color:#fff;border-color:#52525b;";
    default:
      return "background:#d4d4d8;color:#111;border-color:#e4e4e7;";
  }
}

function loadState(){
  try{
    const saved = localStorage.getItem(STORAGE_KEY);
    if(saved){
      const parsed = JSON.parse(saved);
      // Migrate: add stripe fields to any kid missing them (safe for existing saves)
      parsed.kids = parsed.kids.map(k => ({
        currentStripe: 0,
        classesSinceStripe: k.classesSincePromo || 0,
        ...k
      }));
      return parsed;
    }
  }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_STATE));
}

let state = loadState();
let viewMonth = new Date(2026,2,1);

function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function nextBelt(current){
  const index = BELTS.indexOf(current);
  return index >= 0 && index < BELTS.length - 1 ? BELTS[index + 1] : current;
}

function setView(name){
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  document.querySelectorAll(".tabbar button").forEach(b => b.classList.remove("active"));
  document.getElementById("view-" + name).classList.add("active");
  document.querySelector(`.tabbar button[data-view="${name}"]`).classList.add("active");
}

function renderStripeDots(currentStripe){
  return Array.from({length: MAX_STRIPES}, (_, i) =>
    `<div class="stripe-dot ${i < currentStripe ? "earned" : ""}"></div>`
  ).join("");
}

function renderDashboard(){
  document.getElementById("tileGrid").innerHTML = state.kids.map(k => {
    // Belt progress
    const rem = classesRemaining(k.classesSincePromo);
    const ready = rem === 0;
    const pct = Math.min((k.classesSincePromo / REQUIRED) * 100, 100);
    const statusClass = k.sick ? "sick" : (ready ? "ready" : "progress");
    const statusText = k.sick ? "Sick today" : (ready ? "Ready" : `${rem} left`);

    // Stripe progress
    const stripeMaxed = k.currentStripe >= MAX_STRIPES;
    const stripeRem = stripeMaxed ? 0 : stripeClassesRemaining(k.classesSinceStripe);
    const stripeEligible = !stripeMaxed && stripeRem === 0;
    const stripeStatusClass = stripeMaxed ? "stripe-maxed" : (stripeEligible ? "stripe-ready" : "stripe-progress");
    const stripeStatusText = stripeMaxed
      ? "All stripes earned"
      : stripeEligible
        ? "Eligible to test"
        : `${stripeRem} more needed`;

    return `
      <div class="card tile">
        <div class="tile-top">
          <div>
            <div class="tile-name">${k.name}</div>
            <div class="tile-belt">${k.belt}</div>
          </div>
          <div class="status-pill ${statusClass}">${statusText}</div>
        </div>

        <div class="belt-chip" style="${beltStyle(k.belt)}">
          <span>${k.belt} → ${nextBelt(k.belt)}</span>
        </div>

        <div class="countdown">${rem}</div>
        <div class="countdown-label">classes needed before next belt</div>

        <div class="mini-progress">
          <div class="bar">
            <div class="fill" style="width:${pct}%"></div>
          </div>
        </div>

        <div class="tile-meta">
          <div class="mini">
            <div class="m-label">Since Promo</div>
            <div class="m-value">${k.classesSincePromo}</div>
          </div>
          <div class="mini">
            <div class="m-label">Classes in ${ACTIVE_YEAR}</div>
            <div class="m-value">${k.classes2026}</div>
          </div>
        </div>

        <div class="stripe-section">
          <div class="stripe-header">
            <div class="stripe-label">Stripe Progress</div>
            <div class="stripe-status ${stripeStatusClass}">${stripeStatusText}</div>
          </div>
          <div class="stripe-dots">
            ${renderStripeDots(k.currentStripe)}
          </div>
          <div class="stripe-classes">
            <strong>${Math.min(k.classesSinceStripe, STRIPE_REQUIRED)}</strong> / ${STRIPE_REQUIRED} classes toward next stripe
          </div>
        </div>

        <div class="tile-actions-top">
          <button class="primary" onclick="markPresent(${k.id})">${k.attendedToday ? "Undo Present" : "Mark Present"}</button>
          <button onclick="toggleSick(${k.id})">${k.sick ? "Clear Sick" : "Mark Sick"}</button>
        </div>
        <div class="tile-actions-bottom">
          <button class="stripe-btn" onclick="awardStripe(${k.id})" ${stripeMaxed ? "disabled style='opacity:.4;cursor:not-allowed'" : ""}>+ Stripe</button>
          <button class="secondary" onclick="promoteKid(${k.id})">Promote</button>
        </div>
      </div>
    `;
  }).join("");
}

function renderCalendar(){
  const first = new Date(viewMonth.getFullYear(), viewMonth.getMonth(), 1);
  const last = new Date(viewMonth.getFullYear(), viewMonth.getMonth() + 1, 0);
  const startWeekday = first.getDay();
  const daysInMonth = last.getDate();

  document.getElementById("monthLabel").textContent = monthTitle(viewMonth);

  let html = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]
    .map(n => `<div class="day-name">${n}</div>`)
    .join("");

  for(let i = 0; i < startWeekday; i++){
    html += `<div class="day-cell empty"></div>`;
  }

  for(let day = 1; day <= daysInMonth; day++){
    const iso = new Date(viewMonth.getFullYear(), viewMonth.getMonth(), day, 12).toISOString().slice(0,10);
    const attend = state.attendanceHistory.filter(x => x.date === iso);
    const promos = state.promotionHistory.filter(x => x.date === iso);
    const sick = attend.filter(x => x.type === "sick");

    html += `
      <div class="day-cell">
        <div class="day-num">${day}</div>
        <div class="dots">
          ${attend.some(x => x.type === "present") ? `<i class="dot" style="background:#8b5cf6"></i>` : ""}
          ${sick.length ? `<i class="dot" style="background:#ef4444"></i>` : ""}
          ${promos.length ? `<i class="dot" style="background:#10b981"></i>` : ""}
        </div>
      </div>
    `;
  }

  document.getElementById("calendarGrid").innerHTML = html;

  const recent = [...state.attendanceHistory]
    .sort((a,b) => b.date.localeCompare(a.date))
    .slice(0,25);

  document.getElementById("historyList").innerHTML = recent.length
    ? recent.map(item => `
        <div class="card history-item">
          <div class="history-head">
            <strong>${item.child}</strong>
            <div class="history-date">${friendlyDate(item.date)}</div>
          </div>
          <div class="sub" style="margin-top:6px">${item.type === "present" ? "Attended class" : "Marked sick"}</div>
        </div>
      `).join("")
    : `<div class="empty-state">No attendance history yet.</div>`;
}

function renderHistory(){
  const promotions = [...state.promotionHistory].sort((a,b) => b.date.localeCompare(a.date));

  document.getElementById("promoList").innerHTML = promotions.length
    ? promotions.map(item => `
        <div class="card promo-item">
          <div class="promo-head">
            <strong>${item.child}</strong>
            <div class="promo-date">${friendlyDate(item.date)}</div>
          </div>
          <div class="sub" style="margin-top:6px">${item.from} → ${item.to}</div>
          ${item.note ? `<div class="sub" style="margin-top:6px">${item.note}</div>` : ""}
        </div>
      `).join("")
    : `<div class="empty-state">No promotions logged yet.</div>`;
}

function renderAll(){
  document.getElementById("todayPill").textContent = new Date().toLocaleDateString(undefined,{
    weekday:"short",
    month:"short",
    day:"numeric"
  });
  renderDashboard();
  renderCalendar();
  renderHistory();
}

function addHistory(child, type, d = isoToday()){
  if(state.attendanceHistory.some(x => x.child === child && x.type === type && x.date === d)) return;
  state.attendanceHistory.push({
    id:Math.random().toString(36).slice(2),
    child,
    type,
    date:d
  });
}

function removeHistory(child, type, d = isoToday()){
  state.attendanceHistory = state.attendanceHistory.filter(
    x => !(x.child === child && x.type === type && x.date === d)
  );
}

function incrementYearCount(k, d){
  return yearFromIso(d) === ACTIVE_YEAR ? k.classes2026 + 1 : k.classes2026;
}

function decrementYearCount(k, d){
  return yearFromIso(d) === ACTIVE_YEAR ? Math.max(k.classes2026 - 1, 0) : k.classes2026;
}

function markPresent(id){
  const today = isoToday();

  state.kids = state.kids.map(k => {
    if(k.id !== id) return k;

    const turnOn = !k.attendedToday;

    if(turnOn){
      addHistory(k.name, "present", today);
      removeHistory(k.name, "sick", today);
    }else{
      removeHistory(k.name, "present", today);
    }

    return {
      ...k,
      attendedToday: turnOn,
      sick: turnOn ? false : k.sick,
      classesSincePromo: turnOn ? k.classesSincePromo + 1 : Math.max(k.classesSincePromo - 1, 0),
      classesSinceStripe: turnOn ? k.classesSinceStripe + 1 : Math.max(k.classesSinceStripe - 1, 0),
      classes2026: turnOn ? incrementYearCount(k, today) : decrementYearCount(k, today)
    };
  });

  saveState();
  renderAll();
}

function toggleSick(id){
  const today = isoToday();

  state.kids = state.kids.map(k => {
    if(k.id !== id) return k;

    const newSick = !k.sick;

    if(newSick){
      if(k.attendedToday){
        removeHistory(k.name, "present", today);
      }
      addHistory(k.name, "sick", today);
    }else{
      removeHistory(k.name, "sick", today);
    }

    return {
      ...k,
      sick: newSick,
      attendedToday: false
    };
  });

  saveState();
  renderAll();
}

function awardStripe(id){
  state.kids = state.kids.map(k => {
    if(k.id !== id) return k;
    if(k.currentStripe >= MAX_STRIPES) return k;
    return {
      ...k,
      currentStripe: k.currentStripe + 1,
      classesSinceStripe: 0  // reset stripe class counter after awarding
    };
  });

  saveState();
  renderAll();
}

function removeStripe(id){
  state.kids = state.kids.map(k => {
    if(k.id !== id) return k;
    if(k.currentStripe <= 0) return k;
    return {
      ...k,
      currentStripe: k.currentStripe - 1,
      classesSinceStripe: 0
    };
  });

  saveState();
  renderAll();
}

function promoteKid(id){
  state.kids = state.kids.map(k => {
    if(k.id !== id) return k;

    const from = k.belt;
    const to = nextBelt(k.belt);

    if(from !== to){
      state.promotionHistory.push({
        id: Math.random().toString(36).slice(2),
        date: isoToday(),
        child: k.name,
        from,
        to,
        note: "Progress reset after promotion."
      });
    }

    return {
      ...k,
      belt: to,
      classesSincePromo: 0,
      currentStripe: 0,         // stripes reset on belt promotion
      classesSinceStripe: 0,
      attendedToday: false,
      sick: false
    };
  });

  saveState();
  renderAll();
}

function resetToday(){
  const today = isoToday();

  state.kids = state.kids.map(k => {
    if(k.attendedToday){
      removeHistory(k.name, "present", today);
      return {
        ...k,
        attendedToday: false,
        sick: false,
        classesSincePromo: Math.max(k.classesSincePromo - 1, 0),
        classesSinceStripe: Math.max(k.classesSinceStripe - 1, 0),
        classes2026: decrementYearCount(k, today)
      };
    }

    if(k.sick){
      removeHistory(k.name, "sick", today);
    }

    return {
      ...k,
      attendedToday: false,
      sick: false
    };
  });

  saveState();
  renderAll();
}

document.getElementById("resetToday").addEventListener("click", resetToday);
document.querySelectorAll(".tabbar button").forEach(btn => {
  btn.addEventListener("click", () => setView(btn.dataset.view));
});
document.getElementById("prevMonth").addEventListener("click", () => {
  viewMonth = new Date(viewMonth.getFullYear(), viewMonth.getMonth() - 1, 1);
  renderCalendar();
});
document.getElementById("nextMonth").addEventListener("click", () => {
  viewMonth = new Date(viewMonth.getFullYear(), viewMonth.getMonth() + 1, 1);
  renderCalendar();
});

renderAll();
</script>
