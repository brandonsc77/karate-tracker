<style>
:root{--surface:#fff;--surface-2:#fcfbff;--text:#19172a;--muted:#6b6780;--purple:#6d28d9;--purple-2:#8b5cf6;--border:#e9e3fb;--shadow:0 14px 40px rgba(43,23,89,.08);--radius:24px;--green:#15803d;--green-bg:#dcfce7;--red:#b91c1c;--red-bg:#fee2e2;--gray-pill:#f3f4f6;--gray-text:#3f3f46}
*{box-sizing:border-box} html,body{height:100%}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(180deg,#faf7ff 0%,#f7f7fb 100%);color:var(--text);padding:env(safe-area-inset-top) 14px calc(env(safe-area-inset-bottom) + 90px)}
.app{max-width:900px;margin:0 auto;padding-top:8px}.hero,.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.hero{background:linear-gradient(135deg,#fff 0%,#f7f0ff 100%);padding:22px;margin-bottom:16px}.hero h1{margin:0;font-size:30px;line-height:1.05}.sub{margin-top:8px;color:var(--muted);font-size:14px}
.hero-row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}.pill{display:inline-flex;align-items:center;gap:8px;background:#f3e8ff;color:#5b21b6;font-weight:700;padding:10px 14px;border-radius:999px;font-size:13px}
.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
button{border:none;background:var(--surface);color:var(--text);border-radius:16px;padding:13px 15px;font-size:14px;font-weight:800;border:1px solid var(--border);cursor:pointer}
.primary{background:linear-gradient(135deg,var(--purple),var(--purple-2));color:#fff;border-color:transparent}.secondary{background:#f3e8ff;color:#5b21b6}
.tile-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}.tile{padding:18px;background:linear-gradient(180deg,#fff 0%,#fbf8ff 100%)}
.tile-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.tile-name{font-size:22px;font-weight:900}.tile-belt{font-size:13px;color:var(--muted);font-weight:700;margin-top:4px}

.countdown{margin-top:16px;font-size:42px;font-weight:900;line-height:1}.countdown-label{margin-top:6px;color:var(--muted);font-size:13px}.mini-progress{margin-top:14px}
.bar{width:100%;height:10px;background:#ede9fe;border-radius:999px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--purple-2));border-radius:999px}
.tile-meta{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px}.mini{background:var(--surface-2);border:1px solid var(--border);border-radius:18px;padding:12px}.mini .m-label{font-size:12px;color:var(--muted)}.mini .m-value{font-size:24px;font-weight:900;margin-top:4px}
.tile-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}.tile-actions button{padding:12px 10px}
.calendar-card{padding:18px}.calendar-head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}.section-title{font-size:22px;font-weight:900;margin:10px 0 14px}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.day-name,.day-cell{text-align:center;border-radius:18px;padding:12px 8px}.day-name{font-size:12px;color:var(--muted);font-weight:800}.day-cell{background:var(--surface-2);border:1px solid var(--border);min-height:84px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.day-cell.empty{background:transparent;border:none}
.day-num{font-size:15px;font-weight:900}.dots{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-top:8px}.dot{width:9px;height:9px;border-radius:50%}.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:14px;font-size:13px;color:var(--muted)}.legend span{display:inline-flex;align-items:center;gap:6px}
.history-list,.promo-list{display:grid;gap:12px}.history-item,.promo-item{padding:16px}.history-head,.promo-head{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}.history-date,.promo-date{font-size:13px;color:var(--muted);font-weight:700}.empty-state{padding:22px;text-align:center;color:var(--muted)} .stack{display:grid;gap:16px}

.view{display:none}.view.active{display:block}

<body><div class="app">

<section class="view" id="view-history"><div class="stack"><div class="card promo-item"><div class="section-title" style="margin-top:0">Promotion History</div><div id="promoList" class="promo-list"></div></div></div></section>
</div>

<nav class="tabbar"><button class="active" data-view="dashboard">Overview</button><button data-view="calendar">Calendar</button><button data-view="history">History</button></nav>

function isoToday(){return new Date().toISOString().slice(0,10)}
function friendlyDate(d){return new Date(d+"T12:00:00").toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"})}
function monthTitle(d){return d.toLocaleDateString(undefined,{month:"long",year:"numeric"})}
function yearFromIso(d){return Number(String(d).slice(0,4))}
function classesRemaining(n){return Math.max(REQUIRED-n,0)}

function loadState(){try{const s=localStorage.getItem(STORAGE_KEY); if(s) return JSON.parse(s)}catch(e){} return JSON.parse(JSON.stringify(DEFAULT_STATE))}

function renderCalendar(){

  let html=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(n=>`<div class="day-name">${n}</div>`).join("");
  for(let i=0;i<startWeekday;i++) html+=`<div class="day-cell empty"></div>`;
  for(let day=1;day<=daysInMonth;day++){

  document.getElementById("calendarGrid").innerHTML=html;
  const recent=[...state.attendanceHistory].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,25);
  document.getElementById("historyList").innerHTML=recent.length?recent.map(item=>`<div class="card history-item"><div class="history-head"><strong>${item.child}</strong><div class="history-date">${friendlyDate(item.date)}</div></div><div class="sub" style="margin-top:6px">${item.type==="present"?"Attended class":"Marked sick"}</div></div>`).join(""):`<div class="empty-state">No attendance history yet.</div>`;
}
function renderHistory(){

}
function renderAll(){document.getElementById("todayPill").textContent=new Date().toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"}); renderDashboard(); renderCalendar(); renderHistory()}
function addHistory(child,type,d=isoToday()){if(state.attendanceHistory.some(x=>x.child===child&&x.type===type&&x.date===d)) return; state.attendanceHistory.push({id:Math.random().toString(36).slice(2),child,type,date:d})}
function removeHistory(child,type,d=isoToday()){state.attendanceHistory=state.attendanceHistory.filter(x=>!(x.child===child&&x.type===type&&x.date===d))}
function incrementYearCount(k,d){return yearFromIso(d)===ACTIVE_YEAR ? k.classes2026+1 : k.classes2026}
function decrementYearCount(k,d){return yearFromIso(d)===ACTIVE_YEAR ? Math.max(k.classes2026-1,0) : k.classes2026}
function markPresent(id){
  const today=isoToday();
  state.kids=state.kids.map(k=>{if(k.id!==id) return k; const on=!k.attendedToday; if(on){addHistory(k.name,"present",today); removeHistory(k.name,"sick",today)} else {removeHistory(k.name,"present",today)}; return {...k, attendedToday:on, sick:on?false:k.sick, classesSincePromo:on?k.classesSincePromo+1:Math.max(k.classesSincePromo-1,0), classes2026:on?incrementYearCount(k,today):decrementYearCount(k,today)};});
  saveState(); renderAll();
}
function toggleSick(id){
  const today=isoToday();
  state.kids=state.kids.map(k=>{if(k.id!==id) return k; const newSick=!k.sick; if(newSick){if(k.attendedToday){removeHistory(k.name,"present",today)} addHistory(k.name,"sick",today)} else {removeHistory(k.name,"sick",today)}; return {...k, sick:newSick, attendedToday:false};});
  saveState(); renderAll();
}
function promoteKid(id){
  state.kids=state.kids.map(k=>{if(k.id!==id) return k; const from=k.belt, to=nextBelt(k.belt); if(from!==to){state.promotionHistory.push({id:Math.random().toString(36).slice(2), date:isoToday(), child:k.name, from, to, note:"Progress reset after promotion."})} return {...k, belt:to, classesSincePromo:0, attendedToday:false, sick:false};});
  saveState(); renderAll();
}
function resetToday(){
  const today=isoToday();
  state.kids=state.kids.map(k=>{if(k.attendedToday){removeHistory(k.name,"present",today); return {...k, attendedToday:false, sick:false, classesSincePromo:Math.max(k.classesSincePromo-1,0), classes2026:decrementYearCount(k,today)}} if(k.sick) removeHistory(k.name,"sick",today); return {...k, attendedToday:false, sick:false};});
  saveState(); renderAll();
}
document.getElementById("resetToday").addEventListener("click", resetToday);
document.querySelectorAll(".tabbar button").forEach(btn=>btn.addEventListener("click",()=>setView(btn.dataset.view)));
document.getElementById("prevMonth").addEventListener("click",()=>{viewMonth=new Date(viewMonth.getFullYear(),viewMonth.getMonth()-1,1); renderCalendar()});
document.getElementById("nextMonth").addEventListener("click",()=>{viewMonth=new Date(viewMonth.getFullYear(),viewMonth.getMonth()+1,1); renderCalendar()});
renderAll();
</script></body></html>
